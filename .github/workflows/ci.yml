name: CI

on:
  push:
  pull_request:

jobs:
  docs-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run tests
        run: pytest
      - name: Smoke test case-study generator
        run: |
          python tools/new_case_study.py \
            --title "Incident Triage Copilot" \
            --problem "Escalation queue was bottlenecked" \
            --outcome "Mean time to triage dropped 24%"

      - name: Smoke test feature prioritizer
        run: |
          cat > /tmp/features.csv << 'CSV'
          feature,reach,impact,confidence,strategic_fit,effort
          Slack escalation digest,4,5,4,5,2
          Bulk policy editor,3,4,3,4,4
          CSV

          python tools/prioritize_features.py \
            --input /tmp/features.csv \
            --output /tmp/prioritized-backlog.md
          test -f /tmp/prioritized-backlog.md
